name: 1riel

services:

  mongodb:
    # database
    image: mongo:latest
    container_name: mongodb
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped



  minio:
    # object storage
    image: minio/minio:latest
    container_name: minio
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
  



  telegram:
    # telegram bot
    build:
      context: server # path to backend server
      dockerfile: services/telegram/Dockerfile
    container_name: telegram
    env_file:
      - .env
    restart: unless-stopped


  
  server:
    # backend server
    build:
      context: server # path to backend server
      dockerfile: Dockerfile
    container_name: server
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  
  
  client:
    # frontend client
    build:
      context: client # path to frontend client
      dockerfile: Dockerfile
    container_name: client
    env_file:
      - .env
    ports:
      - "80:80"
    restart: unless-stopped



volumes:
  mongo_data:
  minio_data: